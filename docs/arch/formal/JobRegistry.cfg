\* TLC model-checker configuration for JobRegistry.tla
\* State-space estimate: MaxJobs=2, MaxProgress=2 -> ~400 reachable states
\* Runtime: < 5 seconds on a laptop-class machine.

SPECIFICATION Spec

CONSTANTS
    MaxJobs     = 2
    MaxProgress = 2

\* State predicates -- checked at every reachable state.
INVARIANT TypeOK
INVARIANT TerminalIsAbsorbing
INVARIANT CancelIdempotent

\* Temporal / action-level properties -- checked against the full behaviour graph.
PROPERTY NoRegression
PROPERTY MonotonicProgress
PROPERTY EventualTermination
