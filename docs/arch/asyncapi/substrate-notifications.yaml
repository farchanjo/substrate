---
asyncapi: 3.0.0
info:
  title: substrate MCP notifications
  version: 0.1.0
  description: |
    Server-emitted notifications over the MCP STDIO transport.
    Per ADR-0005 (STDIO sanctity), ADR-0040 (async job control-plane),
    ADR-0013 (MCP protocol version 2025-11-25).
  license:
    name: MIT OR Apache-2.0
servers:
  stdio:
    host: localhost
    protocol: stdio
    description: STDIO transport (per ADR-0005)
channels:
  notificationsProgress:
    address: notifications/progress
    description: |
      Server emits throttled progress updates for a long-running job
      per ADR-0040 section 4. Events suppressed unless 250 ms elapsed
      since last emission OR progress delta >= 1 percentage point.
      progressToken equals job_id equals correlation_id
      (triple equality per ADR-0040).
    messages:
      progressEvent:
        $ref: '#/components/messages/ProgressEvent'
      streamProgressEvent:
        $ref: '#/components/messages/StreamProgressEvent'
  notificationsCancelled:
    address: notifications/cancelled
    description: |
      Client requests cancellation of an in-flight tools/call per
      ADR-0037. The MCP dispatch layer MUST map the requestId to
      job.cancel(progressToken) per ADR-0040 CancellationToken
      propagation rules.
    messages:
      cancelEvent:
        $ref: '#/components/messages/CancelEvent'
  notificationsLog:
    address: notifications/log
    description: |
      Diagnostic structured logs forwarded to the client per ADR-0036
      error taxonomy. All substrate logging goes to stderr via
      tracing_subscriber per ADR-0005; this channel forwards a
      structured subset to the MCP client for observability.
    messages:
      logEvent:
        $ref: '#/components/messages/LogEvent'
  notificationsResourcesUpdated:
    address: notifications/resources/updated
    description: |
      Server pokes a subscribed resource whose contents changed, per
      ADR-0066 (launch distilled event stream) and ADR-0013
      resources{subscribe,listChanged}. The poke carries ONLY the stable,
      cursor-less resource URI; the client reads the delta via
      resources/read with ?since=<cursor>. Pokes are coalesced to at most
      one per interval per resource (ADR-0066 notify.rate_per_sec).
    messages:
      resourceUpdatedEvent:
        $ref: '#/components/messages/ResourceUpdatedEvent'
operations:
  emitProgress:
    action: send
    channel:
      $ref: '#/channels/notificationsProgress'
    summary: >-
      Server emits throttled progress update for an async job
      (ADR-0040 section 4).
  receiveCancel:
    action: receive
    channel:
      $ref: '#/channels/notificationsCancelled'
    summary: >-
      Server receives client cancellation; maps to job.cancel per
      ADR-0040.
  emitLog:
    action: send
    channel:
      $ref: '#/channels/notificationsLog'
    summary: Server emits diagnostic structured log entry per ADR-0036.
  emitResourceUpdated:
    action: send
    channel:
      $ref: '#/channels/notificationsResourcesUpdated'
    summary: >-
      Server emits a coalesced resource-updated poke for a launch stack
      event or log resource (ADR-0066).
components:
  messages:
    ProgressEvent:
      name: ProgressEvent
      summary: >-
        Throttled progress update (250 ms or 1% delta per ADR-0040
        section 4).
      contentType: application/json
      payload:
        type: object
        required:
          - progressToken
          - progress
        properties:
          progressToken:
            description: |
              UUIDv7 Crockford base32 (26 chars); equals job_id equals
              correlation_id per ADR-0040 triple-equality contract.
            type: string
            pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
          progress:
            description: Current progress percentage (0-100 integer).
            type: integer
            minimum: 0
            maximum: 100
          total:
            description: >-
              Total units (always 100 for percentage-based reporting).
            type: integer
            default: 100
          message:
            description: Human-readable status message (max 120 chars).
            type: string
            maxLength: 120
          sequence_number:
            description: |
              Monotonic per-job counter sourced from AtomicU64 per
              ADR-0040. Clients MUST use this to detect dropped events
              and reorder out-of-order deliveries.
            type: integer
            minimum: 0
          job_id:
            description: >-
              UUIDv7 of the job; equals progressToken per ADR-0040
              triple-equality.
            type: string
            pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
          job_state:
            description: >-
              Current JobState at time of emission per ADR-0040 state
              machine. Serialised as snake_case (serde rename_all =
              "snake_case").
            type: string
            enum:
              - pending
              - running
              - succeeded
              - failed
              - cancelled
              - timed_out
    StreamProgressEvent:
      name: StreamProgressEvent
      title: Subprocess stream chunk progress event
      summary: >-
        Subprocess stdout/stderr chunk delivered as a
        notifications/progress frame per ADR-0054 stream multiplex.
      description: |
        rmcp 1.7 wire-format constraint: ProgressNotificationParam
        exposes only four fields (progressToken, progress, total,
        message). Stream-extension fields (stream, chunk_base64,
        chunk_bytes, seq, byte_offset, job_state) cannot be carried as
        top-level keys because rmcp 1.7 does not support a _meta
        extension map on ProgressNotificationParam. As a result, all
        stream-extension fields are packed as a JSON-encoded object
        inside the standard message field. Consumers MUST JSON-parse
        message to extract stream payload.

        This is a known limitation tracked as a TODO in ADR-0054:
        migrate to top-level fields when rmcp adds _meta extension
        support. Until then, the message field carries the JSON shape
        described by StreamMessagePayload.

        The progressToken equals job_id (ADR-0040 triple-equality).
        The progress field is a fixed sentinel: 0.0 on every non-terminal
        chunk frame (total absent) and 100.0 on the terminal sentinel frame
        (total 100.0). Byte tracking is conveyed separately via byte_offset
        inside the packed StreamMessagePayload. The terminal sentinel event
        includes job_state in the packed message to signal subprocess
        completion without a separate notification.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/StreamProgressEventPayload'
    CancelEvent:
      name: CancelEvent
      summary: >-
        Client-initiated cancellation of an in-flight tool call.
        Mapped to job.cancel(progressToken) per ADR-0040
        CancellationToken propagation.
      contentType: application/json
      payload:
        type: object
        required:
          - requestId
        properties:
          requestId:
            description: |
              The MCP requestId of the in-flight tools/call to cancel.
              The dispatch layer resolves this to the job_id via the
              progressToken.
            type: string
          reason:
            description: Optional human-readable cancellation reason.
            type: string
    LogEvent:
      name: LogEvent
      summary: >-
        Diagnostic structured log entry per ADR-0036 error taxonomy.
      contentType: application/json
      payload:
        type: object
        required:
          - level
          - logger
        properties:
          level:
            description: Log severity matching tracing crate conventions.
            type: string
            enum:
              - trace
              - debug
              - info
              - warn
              - error
          logger:
            description: Logger or module name (e.g., substrate_fs_query::find).
            type: string
          data:
            description: Arbitrary structured key-value data for the log event.
            type: object
          correlation_id:
            description: |
              UUIDv7 Crockford base32 correlation ID per ADR-0036.
              Equals job_id when scoped to an async job per ADR-0040.
            type: string
            pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    ResourceUpdatedEvent:
      name: ResourceUpdatedEvent
      summary: >-
        Cursor-less poke that a subscribed resource changed; the client
        reads the delta via resources/read?since=<cursor> (ADR-0066).
      contentType: application/json
      payload:
        type: object
        required:
          - uri
        properties:
          uri:
            description: |
              The stable, cursor-less resource URI that was subscribed and
              has new content, e.g. launch://stack/<id>/events or
              launch://stack/<id>/service/<svc>/log. The ?since cursor is
              NOT part of this URI; it belongs only on resources/read.
            type: string
  schemas:
    StreamProgressEventPayload:
      description: |
        Top-level shape of a notifications/progress frame carrying a
        subprocess stream chunk. Due to the rmcp 1.7 ProgressNotificationParam
        wire-format constraint (no _meta extension support), stream-extension
        fields are packed as JSON inside the message field. See ADR-0054.
      type: object
      required:
        - progressToken
        - progress
        - message
      properties:
        progressToken:
          description: |
            UUIDv7 Crockford base32 (26 chars); equals job_id per
            ADR-0040 triple-equality contract.
          type: string
          pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        progress:
          description: |
            Fixed sentinel value per ADR-0054: 0.0 on every non-terminal
            chunk frame; 100.0 on the terminal sentinel frame. Does not
            represent cumulative bytes or a percentage of work done. Byte
            tracking is carried via byte_offset inside the packed message.
          type: number
          minimum: 0
          maximum: 100
        total:
          description: |
            Absent (or omitted) on non-terminal chunk frames; 100.0 on
            the terminal sentinel frame matching the progress sentinel.
            Included only for protocol compatibility with rmcp 1.7.
          type: number
          default: 0
        message:
          description: |
            JSON-encoded StreamMessagePayload object packed into the
            standard message field due to rmcp 1.7 ProgressNotificationParam
            lacking _meta extension support (ADR-0054 TODO: migrate when
            rmcp adds _meta). Consumers MUST JSON-parse this field to
            extract stream payload fields.
          type: string
          contentSchema:
            $ref: '#/components/schemas/StreamMessagePayload'
    StreamMessagePayload:
      description: |
        JSON object packed inside StreamProgressEventPayload.message.
        Carries all stream-extension fields that cannot be expressed as
        top-level ProgressNotificationParam keys in rmcp 1.7.
      type: object
      required:
        - stream
        - chunk_base64
        - chunk_bytes
        - seq
        - byte_offset
      properties:
        stream:
          description: |
            Identifies which subprocess output stream this chunk
            belongs to.
          type: string
          enum:
            - stdout
            - stderr
        chunk_base64:
          description: |
            Base64-encoded bytes of the captured output chunk. Decode
            to recover the original raw bytes.
          type: string
          contentEncoding: base64
        chunk_bytes:
          description: |
            Number of raw (pre-base64) bytes in this chunk. Range 0..4096
            per ADR-0054 chunk-size budget.
          type: integer
          minimum: 0
          maximum: 4096
        seq:
          description: |
            Monotonic per-job per-stream sequence counter starting at 0
            per ADR-0054 (wire name `seq`). Consumers MUST use this to
            detect dropped chunks and reorder out-of-order deliveries
            within a single stream (stdout or stderr).
          type: integer
          minimum: 0
        byte_offset:
          description: |
            Byte offset of this chunk within the full stream since process
            start. Enables reassembly of the complete stream from partial
            deliveries.
          type: integer
          minimum: 0
        job_state:
          description: |
            Present ONLY in the terminal sentinel event to signal subprocess
            completion. Consumers MUST treat its presence as end-of-stream
            for this job. Absent on all non-terminal chunks. Serialised as
            snake_case per ADR-0040 (serde rename_all = "snake_case").
          type: string
          enum:
            - succeeded
            - failed
            - timed_out
            - cancelled
        exit_code:
          description: |
            Always JSON null in the terminal sentinel event per ADR-0054.
            The StreamChunkObserver::on_terminal trait surface carries no
            exit_code; the authoritative exit_code is obtained via
            subprocess.result. ADR-0054 permits exit_code: null for
            killed or pre-exit-cancelled processes.
          type: integer
          nullable: true
