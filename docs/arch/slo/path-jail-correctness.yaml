---
apiVersion: openslo.com/v2alpha
kind: SLO
metadata:
  name: substrate-pathjail-correctness
  displayName: PathJail correctness rate
  labels:
    bounded_context: cross-cutting
    security: critical
spec:
  description: |
    PathJail (per ADR-0035 with openat2(RESOLVE_BENEATH|NO_SYMLINKS)
    on Linux / O_NOFOLLOW_ANY on macOS) MUST reject 100% of
    out-of-allowlist paths. This is a correctness invariant, not a
    performance SLO. Any violation indicates a tier-1 syscall
    regression or an audit gap. ADR-0004 (defense-in-depth) and
    ADR-0039 (SLI definitions) apply.
  service: substrate-mcp-server
  indicator:
    metadata:
      name: pathjail-violations
    spec:
      ratioMetric:
        counter: true
        good:
          metricSource:
            metricSourceRef: substrate-audit-log
            type: audit-log
            spec:
              # ADR-0039 / ADR-0035: count audit events where
              # outcome = "error" AND error_code = "SUBSTRATE_PATH_OUTSIDE_JAIL"
              # (a blocked evaluation is the good event — it means the jail
              # correctly rejected the path; the SLO target is 1.0 = all
              # out-of-allowlist paths are blocked).
              filter: |
                outcome = "error"
                AND error_code = "SUBSTRATE_PATH_OUTSIDE_JAIL"
              window: 1h
        total:
          metricSource:
            metricSourceRef: substrate-audit-log
            type: audit-log
            spec:
              # Total = all path-jail evaluations that reached the kernel
              # check, identified by the pathjail_evaluated structured field
              # emitted by the policy enforcement layer (ADR-0038 field).
              filter: |
                pathjail_evaluated = true
              window: 1h
  timeWindow:
    - duration: 30d
      isRolling: true
  budgetingMethod: Occurrences
  objectives:
    - displayName: 100% block rate
      target: 1.0
