version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - cargo
    groups:
      rust-async:
        patterns:
          - tokio
          - tokio-*
          - tokio_*
          - futures
          - futures-*
          - async-*
      rust-serde:
        patterns:
          - serde
          - serde_*
      rust-tracing:
        patterns:
          - tracing
          - tracing-*
      rust-error-utils:
        patterns:
          - thiserror
          - anyhow
          - eyre
      rmcp-stack:
        patterns:
          - rmcp
          - rmcp-*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
