name: Bug report
description: Report a defect in a substrate tool, the MCP server, or the spec framework.
title: "bug(<scope>): <short description>"
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        For **security vulnerabilities**, do not open a public issue — see [SECURITY.md](../SECURITY.md).

        Please include the `correlation_id` from the stderr audit log when relevant; it lets the maintainer trace the request across logs.
  - type: input
    id: substrate_version
    attributes:
      label: substrate version
      description: Output of `substrate-mcp-server --version` (or commit SHA if built from source).
      placeholder: "v0.1.0 (commit abc1234)"
    validations:
      required: true
  - type: input
    id: os_kernel
    attributes:
      label: OS and kernel
      description: Output of `uname -a` (Linux/macOS) or equivalent.
      placeholder: "Darwin Terra.local 25.4.0 ... arm64"
    validations:
      required: true
  - type: dropdown
    id: bounded_context
    attributes:
      label: Bounded context
      description: Which subsystem is affected?
      options:
        - filesystem-query
        - filesystem-mutation
        - process
        - system-info
        - text-processing
        - archive
        - job (async control-plane)
        - cross-cutting (capability negotiation, error envelope, signal handling)
        - spec framework (lint, validators)
        - other / unknown
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph describing the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal repro — config snippet, JSON-RPC request, exact CLI invocation. Use fenced code blocks.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen? Reference the relevant ADR or Gherkin feature if known.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the error envelope (`code`, `message_en_us`, `recovery_hint`, `correlation_id`) if any.
      render: json
    validations:
      required: true
  - type: textarea
    id: stderr_log
    attributes:
      label: stderr audit log snippet
      description: Paste the JSON audit-event line(s) that surround the failure. Strip secrets before pasting.
      render: text
  - type: checkboxes
    id: dco
    attributes:
      label: Acknowledgement
      options:
        - label: I have read [SECURITY.md](../SECURITY.md) and confirm this is **not** a security vulnerability.
          required: true
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
