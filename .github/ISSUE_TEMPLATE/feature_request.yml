name: Feature request
description: Propose a new tool, capability, or behavior change.
title: "feat(<scope>): <short description>"
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an enhancement.

        Substrate is **spec-as-source-of-truth**: non-trivial features start with an ADR draft under `docs/arch/adr/` and a Gherkin feature under `docs/arch/specs/features/<bc>/`. This template helps the maintainer decide whether an ADR is required before code lands.

        See [CONTRIBUTING.md](../CONTRIBUTING.md) and [ADR-0001](../docs/arch/adr/0001-record-architecture-decisions.md).
  - type: dropdown
    id: kind
    attributes:
      label: Kind of change
      options:
        - New tool (within an existing bounded context)
        - New bounded context
        - Behavior change to an existing tool
        - New configuration option
        - New cross-cutting concern (error code, audit event, capability)
        - Tooling / spec framework
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: bounded_context
    attributes:
      label: Bounded context (if applicable)
      options:
        - filesystem-query
        - filesystem-mutation
        - process
        - system-info
        - text-processing
        - archive
        - job (async control-plane)
        - cross-cutting
        - not applicable
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user pain or capability gap motivates this change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the interface — tool name, input/output shape, expected error codes, side effects, async zone classification (A/B/C per ADR-0003).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other designs you considered and why you rejected them.
  - type: textarea
    id: impact
    attributes:
      label: Impact on locked decisions
      description: |
        Does this change touch any of the locked anchors (stack, transport, security model, error taxonomy, no-subprocess policy, signal safety)? List the relevant ADR numbers if so. A superseding ADR will likely be required.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have read [CONTRIBUTING.md](../CONTRIBUTING.md) and the architectural anchors section.
          required: true
        - label: I have searched existing issues and ADRs for prior art.
          required: true
        - label: I am willing to draft the ADR and Gherkin feature (or coordinate with the maintainer to do so).
